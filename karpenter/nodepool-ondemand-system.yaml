apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: ondemand-system
spec:
  template:
    metadata:
      labels:
        billing-team: platform
        capacity-type: on-demand
    spec:
      nodeClassRef:
        apiVersion: karpenter.k8s.aws/v1
        kind: EC2NodeClass
        name: default
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - m6i.large
            - m6i.xlarge
            - m6i.2xlarge
            - m6a.large
            - m6a.xlarge
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
      # Only schedule system/critical workloads here
      taints:
        - key: CriticalAddonsOnly
          value: "true"
          effect: NoSchedule
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 300s
  limits:
    cpu: "100"
    memory: 400Gi
  weight: 1  # lower weight — prefer spot NodePool
